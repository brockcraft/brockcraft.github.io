  <script>
    const md = "# Redesigning a Graduate Course with AI: A Process Guide\n\n**Brock Craft, University of Washington, Department of Human Centered Design & Engineering**\n\n---\n\n## Note on this revised draft\n\nThe sections that changed most are these:\n\n- **The Problem** and **What \"AI-Assisted Curriculum Revision\" Actually Means** now make the origin story more concrete. They explain the redesign not just as a reaction to better coding models, but as a response to a real instructional problem in a ten-week graduate course for HCD students.\n- **The Tool Stack and How It Evolved** now names the major design choices more precisely: the move away from Kaggle and bottom-up Python, the choice of Cursor over VS Code, the early use of vibecoding tools, and the eventual split between early exploratory work in Claude.ai and later file-based production work.\n- **The Three-Thread Architecture** and **The File System** are now more specific about how the project was organized in practice, including the authoring model of Markdown-first course materials, the role of the teaching guide, the use of task files and resuming blocks, and the reasons Canvas was treated as downstream.\n- **The Production Sequence** now reflects the actual sequence that emerged in the design archives rather than a more abstract workflow.\n- **Gotchas** has been expanded substantially. The earlier draft captured the broad categories, but the archives revealed more design-level and production-level course corrections: the need to override the AI's assumptions about classroom reality, the midstream refinement of competency domains, a deployment simplification that removed Railway and Render from the student-facing model, slide-build failures, and the specific kinds of Canvas IMSCC failures that made import work fragile.\n- **A Note on Competency-Based Assessment** now explains the rationale for the model more clearly and grounds it in the actual assessment mechanics that were chosen.\n- **What This Produced** and **Files Produced by This Project** have been updated to better match the fuller project record that appears in the archive files.\n\nOne limitation: `curriculum_revision_rules.md` was referenced in the brief but was not available in the files provided in this chat. Where it mattered, this draft relies on technical details that were repeated in the design archive files themselves.\n\n---\n\n## The Problem\n\nHCDE 530 is a graduate course in computational methods for students in Human Centered Design and Engineering \u2014 an MS program whose graduates go on to work as UX researchers, UX designers, and design strategists. The course has always had a practical goal: give students enough technical competency that they can collect and analyze data programmatically, prototype lightweight interactions, and collaborate more effectively with developers because they understand, at least approximately, what developers do.\n\nFor years, that meant teaching Python from the ground up. It was hard but defensible. Non-programmers in a ten-week quarter could acquire enough skill to do useful things \u2014 scrape data, clean a CSV, call an API \u2014 and the exercise of learning to program had secondary benefits even for students who would never write code professionally.\n\nThen large language models got good enough to code.\n\nBy late 2024, it was clear that the course needed a substantial rethink. Not because the learning objectives had changed \u2014 students still needed to work with data, build lightweight tools, and understand programmers' work \u2014 but because the path to those objectives had shifted. A student who can articulate a problem clearly, inspect generated code, question an output, and decide whether it is trustworthy can now do useful work much sooner than a student who has spent ten weeks memorizing syntax. The old course had taught programming as the main route to computational competence. The redesign began from a different premise: for these students, in this program, computational competence now depends more on judgment than on hand-writing code from scratch.\n\nThat shift was not abstract. HCDE 530 serves students in a professional master's program, many of whom are career changers and many of whom are not aiming to become software engineers. The course meets once a week, on Wednesday evenings, for four hours. That produces a particular instructional problem. There is enough time to do substantial work in class, but not enough time to build conventional programming fluency from the ground up without pushing the course toward a computer science identity that is misaligned with the students and the degree.\n\nThe previous version of the course had also drifted toward that problem. It used Kaggle notebooks, standard Python exercises, data manipulation libraries, and a larger machine learning component. None of that was irrational. But it pulled the course toward data science training rather than toward the professional needs of HCD practitioners. One of the earliest redesign decisions was therefore not just to modernize the course, but to recenter it.\n\nI was also on sabbatical with a compressed timeline \u2014 the kind of timeline that would normally rule out anything more than incremental updates. What I needed was a way to do a substantive redesign quickly, maintain coherence across ten weeks of new material, produce all the artifacts a modern course requires, and do it in a way that preserved my voice and judgment as the instructor. AI made that possible. Not by replacing design judgment, but by making it feasible to turn a series of design decisions into a complete and coherent set of course materials in something like 15\u201320 hours of active work spread across the life of the project.\n\nThis is a write-up of how I did that, using Claude as a collaborative design partner. It is intended for faculty and instructional designers who want to attempt something similar. It is not a sales pitch for any particular tool. It is an account of what was designed, how the workflow evolved, which file structures turned out to matter, and where the process needed correction.\n\n---\n\n## What \"AI-Assisted Curriculum Revision\" Actually Means\n\nBefore getting into the mechanics, it is worth being clear about what this was and was not.\n\nClaude did not design the course. I designed the course. What Claude did was help me move from design decisions to finished artifacts much faster than I could have alone. Once I had established the conceptual frame, Claude could draft a ten-week teaching guide, produce assignment descriptions that matched the emerging competency model, create TA-facing materials in the right register, and help propagate a change across many interdependent files.\n\nIt also served as a design partner in a narrower sense. Early in the process, the conversation was not about writing documents. It was about pressure-testing ideas. Should the course still teach Python as a primary skill? Should students use a general code editor or an AI-native one? Should a deployed final project require a server, or should deployment be simplified to fit the actual needs of the course? Should machine learning remain as a technical unit, or be reframed as a critical reading and evaluation problem? AI was useful in this phase because it could keep multiple implications in view at once and make it easy to compare alternatives. But the alternatives still had to be chosen.\n\nThe human judgment in this project was substantial and constant. Claude has no direct knowledge of the social dynamics of a graduate classroom, the physical layout of an active learning room with seven round tables, the realistic amount of live coding a professor can demo in one evening, or the difference between what sounds coherent in a planning document and what students will actually engage with at 7 PM on a Wednesday after a day at work. It also has no reliable instinct for when a technically plausible idea is pedagogically wrong for a particular course.\n\nThat mattered repeatedly. Some of the most useful moments in the design archives are not moments when the AI produced a strong draft, but moments when I had to redirect it. The redesign kept getting better when the conversation stayed anchored to actual students, actual class meetings, actual professional scenarios, and actual constraints. The AI handled production and helped surface options. I handled judgment, sequencing, tone, and fit.\n\nThat division of labor is the core of this method.\n\n---\n\n## Starting Materials\n\nThe raw materials I brought into the project at the outset were straightforward, but they ended up being used in different ways.\n\n- **An IMSCC export from Canvas** \u2014 the LMS course package from the previous year's version of the course. IMSCC is a standard e-learning interchange format, but its internal structure is not self-documenting. It became relevant twice: first as a source of prior assignment text and course structure, and later as the ground truth for building a compliant import file for the redesigned course shell.\n- **The previous year's syllabus** as a PDF.\n- **The previous year's session slide decks** as PDFs.\n- **A body of prior course content** extracted from Canvas into structured JSON.\n- **Some example Python scripts** from prior iterations of the course.\n\nThe slide decks and Canvas content were useful, but not in the same way. The old slides were a scrap pile rather than a template. They helped identify what the previous course had emphasized, what examples might still be worth adapting, and where the old conceptual scaffolding might be reused. But they were not something to preserve wholesale. Much of the course had changed too much for that. The extracted Canvas content was more practically useful because it preserved the tone and structure of prior assignments and made it possible to reuse what was still sound without copying the old course into a new context.\n\nA related lesson surfaced early: not all source material is worth feeding into an AI conversation at the same time. PDFs are expensive to analyze, especially when they contain code screenshots or dense slide layouts. The useful strategy was to extract specific kinds of information when needed rather than treating the archive as one giant input context. That became even more important once the slide generation work moved into its own thread.\n\n---\n\n## The Tool Stack and How It Evolved\n\nThe redesign was not built around a single tool. It moved through a sequence of tools because the work itself changed shape.\n\nThe project started in **Claude.ai** using a Project, which was the right environment for exploratory work. At that stage the main tasks were conceptual: deciding how far the course should move away from bottom-up Python, establishing the professional framing for vibecoding, defining the competency model, and working out a week-by-week structure that would still feel coherent by the end of the quarter.\n\nSeveral early course-level decisions emerged quickly from that phase.\n\nFirst, the course would no longer teach Python as a primary end in itself. The framing that emerged in the design conversation was a distinction between **Python fluency** and **Python literacy**. Students in this course did not need to memorize syntax or produce large amounts of code from scratch. They needed to be able to read generated code, recognize what common structures were doing, modify them, and know when something looked wrong. That became one of the load-bearing reframes in the redesign.\n\nSecond, **Kaggle was removed entirely**. This was not because Kaggle is a bad environment. It was because it pulled students toward a data science identity that was not the point of the course. The redesign wanted to keep the work closer to HCD practice: prototyping, lightweight tools, data inspection, documentation, and judgment.\n\nThird, **VS Code was replaced by Cursor**. The reasoning here was simple. Cursor is built on the VS Code codebase, so there was no meaningful capability loss, but its AI integration made the read-explain-modify loop much tighter. The course was being redesigned around a mode of work in which students would use AI as a coding partner. That made an AI-native editor the better fit.\n\nFourth, the redesign introduced **vibecoding before Python**. Week 1 began with web-based tools that required no installation and produced immediate results. In the design archives, this was not treated as a gimmick. It was a motivational and pedagogical choice. Students first saw that they could describe an idea, get a prototype into a browser, and then compare outputs across tools. Only after that did the course move into local tooling, Python, and code literacy.\n\nThe initial tool stack for the course stabilized around the following roles:\n\n- **Claude.ai** as the coding and reasoning partner throughout\n- **Cursor** as the local development environment\n- **GitHub** for version control and portfolio hosting\n- **Lovable** and **Bolt** as web-based vibecoding examples in the first week\n- **Jupyter Notebooks** for the data-analysis and visualization part of the course\n\nThat stack itself evolved as the redesign progressed. One of the clearer examples concerns deployment. At one point, platforms such as Railway or Render were in the mix for student deployment. Midway through the design work, that option was removed. The course did not need to teach server deployment to achieve its goals. Research-track work could be published as Jupyter notebooks on GitHub, while design-track work could use the public URLs provided by Lovable or Bolt. Stripping out extra infrastructure simplified the final project in a way that made it more teachable and more aligned with the course.\n\nThe tool stack for the **design process** also evolved. Once the project accumulated living source files that needed continuous revision, the upload-download cycle in the web client became cumbersome. That led to a move into **Cowork**, Claude's desktop client operating directly on a local folder. At that point the distinction became clear: use chat when the work is mostly exploratory; use local file access when the work becomes document production and revision.\n\n### Chat vs. local file work\n\nOne practical takeaway from this project is that the right environment depends on the phase of the work.\n\nUse **Claude.ai chat with a Project** when the work is exploratory, argumentative, and still changing shape. That was the right place to debate pedagogical pivots, test phrasing, and compare tool-stack options.\n\nSwitch to **local file-based work** once you have authoritative source files that need to be shared across sessions and revised repeatedly. At that stage, the files themselves become the project memory. Keeping them local removes the friction of re-uploading and reduces the risk that the conversation and the file system drift apart.\n\n---\n\n## The Three-Thread Architecture\n\nAs the work grew, it became clear that a single long conversation was not enough. The redesign eventually settled into a three-thread structure, each thread with a defined responsibility and a defined failure mode.\n\n| Thread | Responsibility | Primary Inputs | Primary Outputs |\n|--------|---------------|----------------|-----------------|\n| **Thread 1** | Course design, teaching guide, assignments, syllabus, TA guides, content source files | Design decisions, task files, conventions | Teaching guide, assignments, syllabus, TA materials |\n| **Thread 2** | Slide generation | Teaching guide, slide specification notes, prior slide archaeology | Per-week slide decks |\n| **Thread 3** | Canvas shell population | Source `.md` files, import notes, IMSCC build structure | Populated Canvas shell |\n\nThe logic here was practical.\n\n**Thread 1** was the authoritative content thread. This is where the course was actually designed and where the main source files lived. It handled the ten-week teaching guide, assignments, syllabus, TA materials, Canvas-facing Markdown, and the operating conventions for the whole project.\n\n**Thread 2** was the slide thread. That thread needed to preserve a distinct kind of continuity: aesthetic choices, layout motifs, speaker note conventions, and the technical structure of the PowerPoint build scripts. It would have been a mistake to mix those concerns into the content thread. The slide thread ended up developing its own local rules and its own failure cases.\n\n**Thread 3** was the Canvas thread. This deserved isolation because Canvas population turned out to be fragile and procedural in a different way. Import failures were silent. Rubric configuration order mattered. XML and ZIP details mattered. Links had to be resolved late. None of that should contaminate the source-authoring thread.\n\nThe separation also made it easier to resume work after long sessions. Each thread had its own task file and, in practice, its own resumption logic. That seems minor until a conversation gets long enough that decisions made hours earlier start to slip. At that point, thread boundaries are not a luxury. They are what keep the project navigable.\n\nA useful rule emerged from this structure: Thread 1 owns content, Thread 2 owns slides, Thread 3 owns Canvas. Downstream threads consume source files; they do not rewrite them.\n\n---\n\n## The File System\n\nOne of the most useful results of the redesign was the file architecture that emerged around it. The course materials became more manageable once each file type had a clear role and a clear place in the workflow.\n\n### Markdown as the authoritative layer\n\nThe most important decision was to treat **Markdown files as the source of truth**. Canvas content was not authored in Canvas. Assignments, syllabus content, TA materials, import notes, slide specifications, and coordination files were written as `.md` files first. Canvas was downstream.\n\nThat mattered for several reasons. Markdown is portable, diffable, and easy to inspect. It can be revised cleanly. It is also easy for an AI to operate on without the formatting instability that comes with rich-text systems. By contrast, Canvas is a destination. It is where the content ends up, not where it should live in draft form.\n\nBy the later stages of the project, the local folder had settled into a cleaner structure: a `project/` area for coordination files and standing instructions, a `content/` area for authoritative course text, `docs/` for instructor-facing documents, `slides/` for deck outputs, `canvas/` for the import package and build tooling, `demos/` for in-class assets, `build_scripts/` for document and slide generation utilities, and `archive/` for legacy SP25 material.\n\n### The teaching guide as a central artifact\n\nThe teaching guide became the most valuable artifact in the project, and it was not fully anticipated at the start.\n\nOnce the course structure began to stabilize, it became clear that the redesign needed an instructor-facing guide that was more specific than a syllabus and more coherent than scattered notes. The teaching guide carried the ten-week arc, the timing blocks, the framing language, anticipated student confusion points, recovery strategies, and markers for where slides would need to support the teaching. It also became the source for later derivatives: TA guides, slide specifications, and some assignment details.\n\nThis matters because one of the quiet strengths of AI in a project like this is that it makes it feasible to author supporting documents that would normally feel too expensive to produce. A week-by-week teaching guide is valuable, but writing one by hand from scratch while also redesigning the course is a lot. Once the conceptual decisions were in place, AI made that extra layer of instructional infrastructure affordable.\n\n### Operational files as project memory\n\nA second class of files existed not for students or instructors, but for the project itself.\n\nThese included onboarding and task files such as `AGENT_START.md`, `HANDOFF.md`, `thread1-tasks.md`, `thread2-tasks.md`, and the standing conventions file. They served as the project's memory between sessions. One especially useful pattern was the **RESUMING block** at the top of task files: a plain-language description of where the work left off, what files were authoritative, and what should happen next. That turns out to matter a great deal when a design effort spans many sessions and multiple threads.\n\n### The `[[LINK:]]` placeholder convention\n\nAnother small but practical convention was the use of `[[LINK: ... ]]` placeholders for destinations that did not yet exist. That allowed the content to be finalized before the course's external resources were ready. Live URLs could be resolved in the final Canvas pass rather than being managed prematurely across drafts and imports.\n\n### Build-facing files\n\nBy the later phases of the project, the file system also included a more technical layer: build scripts for generating the teaching guide, TA guides, PDF reference materials, slide decks, and the Canvas IMSCC package. That layer does not matter for every curriculum revision project, but it mattered here because the redesign had moved from planning into production. Once that happens, naming, structure, and file boundaries stop being clerical details and start affecting whether the system stays coherent.\n\n---\n\n## The Production Sequence\n\nThe work followed an order, and that order turned out to be important.\n\nThe first phase was **course design**. This is where the central decisions were made: move away from bottom-up Python, frame computational work around recognition and judgment, introduce vibecoding before local tooling, simplify deployment, collapse the machine learning unit into critical evaluation, and define the competency structure that would later anchor assessment.\n\nFrom there, the work moved into **the teaching guide**. This was the first major production artifact because it forced the weekly structure to become concrete. It also became the place where many later decisions were made explicit: professional scenarios for each week, the recurring critical-evaluation prompt, the timing model for each class session, and the relationship between demos, activities, studio time, and assignments.\n\nOnly after that did it make sense to write **assignments**. The assignments depended on the course's weekly structure being settled. They also depended on the competency model being at least stable enough to reference consistently. In the archives there is a clear example of why this sequencing matters: the names and meanings of some competency domains were refined midstream, which then forced updates across assignments, slides, and guidance documents.\n\nThe **syllabus** followed the assignments because it needed to refer to assignment names, due dates, assessment logic, and weekly flow. Once the syllabus and assignments existed as source files, the work could move in parallel directions.\n\nOne parallel direction was **slide generation**. That became its own thread because the decks were downstream from the teaching guide but required their own technical and visual logic. The slide work began with a single Week 1 deck as a visual and structural template, then scaled out once the pattern was established.\n\nThe other downstream direction was **Canvas population**. By the time this work began, the preferred strategy was clear: author everything first in Markdown, then build or import into Canvas. That eventually produced a hand-built IMSCC package rather than relying on manual copy-paste for the whole shell.\n\nThere were also some course-specific production choices that emerged from the design rather than from a generic workflow model. The course settled into **ten sessions, not eleven**. Week 1 merged what had initially been separate Lovable and Bolt sessions into a single immediate comparison. Mini Project 1 was launched earlier than first expected so that students could get dataset and question feedback before the notebook work began. The final course used **ten slide decks**. These are the kinds of sequencing details that are easy to gloss over in hindsight but were central to making the redesign hold together.\n\n---\n\n## What Worked Well\n\nSeveral parts of this workflow were more useful than I expected.\n\n### The teaching guide as an emergent artifact\n\nThe teaching guide turned out to be the strongest example of AI creating value not by inventing pedagogy, but by making a good pedagogical artifact feasible to produce. Once the weekly arc was defined, AI could help draft a detailed guide that included timing, framing language, common problems, and recovery strategies. That is the sort of document many instructors would benefit from and almost never have time to write.\n\n### A stable through-line across the quarter\n\nThe redesign benefitted from having a clear recurring intellectual structure. In this case, the through-line was **critical evaluation and professional judgment**. Each week included a short prompt asking some version of: what would a thoughtful practitioner question about this output before acting on it? That question changed shape depending on the week \u2014 sometimes about code, sometimes about a chart, sometimes about AI-produced transcript analysis \u2014 but the habit stayed constant. This gave the course a coherence that the previous version had lacked.\n\n### Professional scenarios helped keep the course grounded\n\nAnother strong design decision was the use of realistic HCD practitioner scenarios at the start of each session. These scenarios made the activities legible to career changers and kept the course from feeling like a sequence of disconnected technical tricks. They also helped balance the course across design-oriented and research-oriented work.\n\n### Markdown-first authoring\n\nWriting assignments and other student-facing materials as Markdown source files before touching Canvas made the whole project more stable. This was true for revision, for reuse, and for AI collaboration. It also made it possible to treat the course shell as a build target rather than a drafting environment.\n\n### Living conventions files\n\nThe standing conventions file and the thread task files worked well because they absorbed project memory that would otherwise have stayed trapped in conversation history. Every time a naming rule, workflow rule, or hard constraint was formalized, it could be written down and carried forward. That reduced drift across sessions and threads.\n\n### Derivative documents became easier once the source structure existed\n\nOnce the teaching guide and assignment source files existed, a number of other documents became much easier to generate: TA guides, slide specification notes, GitHub reference materials, Canvas import notes, and process documentation. That is one of the underappreciated strengths of this method. When the underlying file architecture is clean, downstream production becomes much cheaper.\n\n---\n\n## Gotchas\n\nThe design archives contain enough concrete failure points and corrections that this section can be more specific than the first draft was.\n\n### The AI does not know your classroom unless you keep telling it\n\nThis is the most basic one, and it showed up throughout the redesign. Claude can produce plausible course material without any real sense of the room, the students, or the pace. It does not know that this class has forty students, one TA, seven round tables, a mixed cohort of designers and researchers, and a long evening time slot with a dinner break. It does not know that many students are career changers. It does not know which technical burdens are worth imposing in a ten-week quarter and which are not.\n\nWhenever the AI drifted away from those realities, the outputs also drifted. The fix was not subtle: the project needed a persistent file-based memory of classroom constraints, and those constraints needed to be treated as design inputs, not background color.\n\n### The course needed repeated recentering on HCD practice\n\nOne of the most useful early course corrections was the decision to remove Kaggle and push back against a data science identity for the course. That sounds like a tool choice, but it was really a curricular one. The redesign kept having to answer the same question: is this helping students become thoughtful HCD practitioners who can work with computational tools, or is it pulling them toward an adjacent identity that is not the actual goal?\n\nThat same recentering happened in the handling of machine learning. The previous course had spent multiple weeks on implementation-heavy ML content. In the redesign, that material was replaced by a single session on evaluating AI-generated qualitative analysis. That was not a retreat from technical content. It was a clearer alignment between the course and the kind of judgment students actually need.\n\n### Some ideas had to be simplified because the instructional cost was too high\n\nThe deployment model is the clearest example. At one stage, the course still included options such as Railway or Render. That would have added infrastructure complexity for students and additional support burden for the instructor and TA. The redesign removed those options and simplified the deployment logic: GitHub-hosted notebooks for research-track work, public URLs from the vibecoding tools for design-track work. The archives make clear that this was not cosmetic. It was a load-bearing simplification.\n\n### Competency domain naming sounds minor until it is not\n\nThe competency-based assessment model worked well, but only after the competency domains were refined. Mid-session label changes to domains such as code literacy/documentation and critical evaluation/professional judgment had to be propagated across assignments, slides, teaching guide language, and assessment logic. That is a good reminder that naming is not decorative. If the labels are unstable, every downstream artifact becomes unstable.\n\n### The AI will happily generate locally coherent but globally inconsistent material\n\nThis showed up in several forms. A session might make sense in isolation but not fit the developmental arc of the quarter. An assignment might reference a concept that had not yet been properly introduced. A slide deck might inherit earlier structure in a way that no longer matched the revised week plan. The redesign improved whenever the conversation shifted from local drafting to checking the ten-week arc as a whole.\n\nOne concrete example is Week 1. Early versions treated Lovable and Bolt as separate weeks. The redesign later merged them into a single session because immediate comparison was more useful and motivational than stretching the comparison across two weeks. That is the kind of structural improvement that only appears when you are looking at the quarter-level arc rather than polishing one week at a time.\n\n### Slide production had its own class of technical failures\n\nThe slide thread produced a different kind of gotcha: production infrastructure errors. The most striking one was the cumulative deck bug. Completed weekly decks were accidentally being treated as the base template for the next week, which meant later decks silently inherited prior slides. By Week 6, decks had bloated well beyond their intended size. The cover slide was also not being patched correctly, so multiple decks still showed the wrong week title.\n\nThat bug had nothing to do with pedagogy, but it matters here because it illustrates a broader point: once a project reaches build-script complexity, the AI can reproduce mistakes very efficiently unless hard constraints are written down and enforced. In this case the fix involved rebuilding the base template as a true single-slide cover file, tightening the helper rules, and making the per-week slide order explicit.\n\n### Canvas import work was fragile in a much more literal way than expected\n\nThe first draft said Canvas import was not a solved problem. The design archives show just how literal that problem was.\n\nThe IMSCC build failed repeatedly with Canvas's usual unhelpful message: an unexpected error, contact support. The actual fixes included details that were nowhere near the pedagogical level of the project but still had to be solved: ZIP entry ordering, an expected `canvas_export.txt` stub, manifest namespaces, identifier formats, schema locations, missing metadata blocks, root element names in support XML, and even the fact that the package needed to be written with `ZIP_STORED` rather than standard compression. Several of these issues caused silent failure. The only way through was systematic comparison with a known-good export from the prior course.\n\nThis is worth stating plainly because it is easy to romanticize AI-assisted workflow at the wrong level. The AI was useful in this part of the process, but only because the work had a strong external reference point and a human who was willing to check each assumption against it.\n\n### Canvas setup order and submission mechanics mattered more than expected\n\nEven after import worked, there were smaller operational traps. Rubrics had to be attached in the right order for complete/incomplete assignments. A particular Canvas quirk meant the grading type had to be set before attaching the non-scoring rubric and removing rubric points. Assignment submission types also had to be corrected midstream. Rather than asking students to paste commit logs into Canvas, the better pattern was to submit repository URLs and keep competency claims in small Markdown files within the repo. That was both cleaner and more faithful to the course's actual logic.\n\n### Context-window and session-management problems are real\n\nThe project also ran into the less dramatic but very real problem of long-session degradation. One archive notes filesystem I/O trouble near the end of a very long session. Another documents the need to stop inventing timestamps and fetch them correctly. These are not glamorous lessons, but they matter. Long, multi-hour conversations accumulate enough context that they become brittle. Handoff files, task files, and thread boundaries were not optional project niceties. They were what made the work resumable.\n\n---\n\n## A Note on Competency-Based Assessment\n\nOne of the structural changes in this redesign was moving away from a traditional points-accumulation grading model toward a competency-based one.\n\nThe first draft described this in broad terms. The design archives make the rationale clearer.\n\nThe course was redesigned around the idea that students should leave with a set of recognizable capabilities: working with vibecoding tools, reading and documenting code, cleaning and handling data, acquiring data from APIs, analyzing data with pandas, making and interpreting visualizations, exercising professional judgment about outputs, and building and publishing a complete artifact. In the final version of the model, these became eight competency domains.\n\nWhat mattered here was not just the list, but the grading logic. The course moved to a hybrid model in which most assignments were marked complete/incomplete and used non-scoring competency-claim rubrics, while the end-of-quarter reflection carried the small amount of explicit points. The grade was then set holistically through portfolio review rather than by accumulating points across many low-level tasks.\n\nThis fit the course for several reasons.\n\nFirst, it aligned better with the redesign's basic premise. If the course is about judgment, communication, and the ability to use computational tools professionally, then a points model built from many tiny technical fragments sends the wrong signal.\n\nSecond, it required more precision in design. It is easy to give a domain a broad label. It is harder to decide what actually counts as evidence for that domain, where in the quarter students will show it, and how to distinguish surface completion from meaningful demonstration. In practice, this forced the redesign to clarify what each assignment was for.\n\nThird, it matched the actual evidentiary logic of the course. Commit histories, repository structure, README files, competency claims, deployed artifacts, notebooks, and reflections all tell part of the story. Some borderline cases were expected to be resolved not through another rubric row, but through a short conversation in which the student walked through the repo and explained the choices.\n\nThis is also where the redesign's emphasis on explanation over mere output became clearest. The difference between stronger and weaker work was not simply technical polish. It was whether the student could explain what they built, why they built it that way, what they trusted, and what they would question before acting on it.\n\n---\n\n## Guidelines for Replicating This Process\n\nIf you want to attempt a similar project, here is what to do.\n\n**Start with design decisions, not artifact production.** Before asking the AI to write anything substantial, settle the major structural questions: what the course is trying to produce, what kind of practitioner it assumes, which tools belong in the stack, what the quarter-level arc is, and how assessment will work. The AI can help compare options, but the answers need to come from the instructor.\n\n**Record classroom realities early and treat them as design inputs.** Room layout, meeting length, student background, TA capacity, tool-install friction, and institutional constraints all need to be in writing. Otherwise the AI will default to generic pedagogy.\n\n**Use the right environment for the phase of work.** Chat works well for exploratory design. Local file access works better once the project has authoritative source files that need repeated revision.\n\n**Treat Markdown as the authoritative content layer.** Write assignments, syllabus content, TA materials, and operating notes as source files before touching the LMS. Canvas is downstream.\n\n**Separate threads by responsibility.** Content design, slide production, and LMS population each have different kinds of context and different failure modes. Keeping them separate reduces contamination and makes recovery easier.\n\n**Write and maintain project-memory files.** A conventions file, task files, and plain-language resuming notes save large amounts of time over the life of the project. They also reduce the chance that decisions made in one session disappear in the next.\n\n**Sequence the production work.** In this project the dependable order was: design decisions, teaching guide, assignments, syllabus, content source files, slides, then Canvas shell. Moving out of sequence introduced rework.\n\n**Expect to revise assessment terminology early.** Competency names and assessment logic should be stabilized before they appear everywhere. Small wording changes can trigger large cleanup work later.\n\n**Assume Canvas import will require testing and iteration.** If your process includes IMSCC or other structured import work, build in time for debugging. Silent failures are normal.\n\n**Review the quarter as a whole at least once.** AI can generate polished local pieces that do not add up to a coherent course. The ten-week arc still needs human review.\n\n---\n\n## What This Produced\n\nBy the end of the process, the redesign had produced more than a revised syllabus and a few refreshed assignments.\n\nIt produced a complete ten-week teaching guide with timing blocks, framing language, common problems, and instructor notes. It produced a set of assignment descriptions authored as source Markdown and ready for Canvas. It produced TA-facing materials calibrated to a non-technical assistant role. It produced slide specification files and, eventually, slide decks for the course sessions. It produced a working Canvas shell through a custom IMSCC build process. It also produced a set of project-memory files \u2014 onboarding documents, standing conventions, task files, handoff files, archive summaries \u2014 that made the work resumable and left behind a process record rather than only a pile of artifacts.\n\nJust as important, it produced a redesigned course with a clearer internal logic than the earlier version had. The quarter now has a stronger through-line, a more coherent tool progression, a more defensible assessment structure, and a better fit between the students' likely futures and the kind of computational work the course asks them to do.\n\nThe process took place across several weeks of intermittent work. The important point is not the precise calendar duration. It is that AI compressed the production burden enough that a substantial redesign became feasible inside a timeline that would otherwise have supported only minor revision. That is the real value here.\n\n---\n\n## Files Produced by This Project\n\nFor reference, the file set that emerged from this project includes both course materials and the operational files that made the workflow possible.\n\n| File | Type | Purpose |\n|------|------|---------|\n| `curriculum_revision_rules.md` | `.md` | Standing orders, conventions, workflow rules, and project memory for future sessions |\n| `AGENT_START.md` | `.md` | Bootstrap file for new sessions \u2014 what to read first and what constraints matter |\n| `thread1-tasks.md` | `.md` | Running task list for the main content thread, with resumption guidance |\n| `thread2-tasks.md` | `.md` | Running task list for the slide thread |\n| `HANDOFF.md` | `.md` | Handoff summary for transitions between phases or sessions |\n| `HCDE530_Teaching_Guide_SP26.docx` | `.docx` | Full ten-week instructor guide |\n| `assignments.md` | `.md` | Authoritative source for student-facing assignment descriptions |\n| `syllabus.md` | `.md` | Authoritative source for the course syllabus |\n| `CANVAS_IMPORT_NOTES.md` / `canvas_import_notes.md` | `.md` | Canvas build instructions, import conventions, and known gotchas |\n| `SLIDE_SPEC_NOTES.md` | `.md` | Slide-generation spec derived from the teaching guide |\n| `ta_guides.md` / `ta_guides.docx` | `.md` / `.docx` | TA-facing guidance derived from the teaching guide |\n| `design-archive-1.md` through `design-archive-5.md` | `.md` | Historical record of the design, slide, and Canvas population threads |\n| `HCDE530_SP25_content.json` | `.json` | Structured extraction of the prior course's Canvas content for reference |\n| `HCDE530_SP26.imscc` | `.imscc` | Canvas import package for the redesigned course shell |\n| `build_imscc.py` and related build files | script / data | Build infrastructure for regenerating the Canvas shell from source |\n\n---\n\n*This write-up reflects the state of the project as of March 2026. The course runs Spring Quarter 2026.*\n";
